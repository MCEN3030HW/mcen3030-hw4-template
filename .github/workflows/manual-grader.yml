# .github/workflows/manual-grader.yml
name: "👉 Click here to run grader"
run-name: "Grader: P1:${{ inputs.grade_p1 }} | P2:${{ inputs.grade_p2 }} | P3:${{ inputs.grade_p3 }}"

on:
  workflow_dispatch:
    inputs:
      grade_p1:
        description: 'Grade Problem 1 (Golden Search)'
        type: boolean
        default: true
      grade_p2:
        description: 'Grade Problem 2 (Steepest Ascent)'
        type: boolean
        default: true
      grade_p3:
        description: 'Grade Problem 3 (Integration)'
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.actor }}
  cancel-in-progress: true

# 🚨 FIX FOR HTTP 403 ERROR 🚨
permissions:
  contents: read
  actions: read

jobs:
  autograder:
    name: Grade Selected Problems
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout Student Code
        uses: actions/checkout@v4

      # ==========================================
      # 1. COOLDOWN & DUPLICATE CHECK
      # ==========================================
      - name: Cooldown & Duplicate Check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST_RUN=$(gh run list --workflow "${{ github.workflow }}" --json databaseId,createdAt,headSha -q ".[] | select(.databaseId != ($GITHUB_RUN_ID | tonumber))" | head -n 1)
          if [ -n "$LAST_RUN" ]; then
            LAST_SHA=$(echo $LAST_RUN | jq -r '.headSha')
            LAST_TIME=$(echo $LAST_RUN | jq -r '.createdAt')
            if [ "$LAST_SHA" == "$GITHUB_SHA" ]; then
              echo "::error::No new changes detected! Please push new code before grading."
              exit 1
            fi
            DIFF=$(( $(date +%s) - $(date -d "$LAST_TIME" +%s) ))
            if [ $DIFF -lt 300 ]; then
              echo "::error::Wait $(( (300 - DIFF) / 60 + 1 )) more minute(s) before grading again."
              exit 1
            fi
          fi

      # ==========================================
      # 2. SETUP ENVIRONMENT & DETECT LANGUAGE
      # ==========================================
      - name: Setup Environment
        id: setup
        run: |
          PY_FILE=$(find . -iname "*.py" | head -1)
          JL_FILE=$(find . -iname "*.jl" | head -1)
          M_FILE=$(find . -iname "*.m" | head -1)
          IPYNB_FILE=$(find . -iname "*.ipynb" | head -1)

          if [ -n "$PY_FILE" ]; then
            echo "lang=py" >> $GITHUB_OUTPUT
            pip install numpy
          elif [ -n "$JL_FILE" ]; then
            echo "lang=jl" >> $GITHUB_OUTPUT
          elif [ -n "$M_FILE" ]; then
            echo "lang=m" >> $GITHUB_OUTPUT
            sudo apt-get update && sudo apt-get install -y octave
          elif [ -n "$IPYNB_FILE" ]; then
            echo "::error::Found a .ipynb file. Please export your code as a .py, .m, or .jl script!"
            echo "lang=ipynb" >> $GITHUB_OUTPUT
          else
            echo "lang=none" >> $GITHUB_OUTPUT
          fi
          
          # Debugging Info
          echo "=== DETECTED LANGUAGE ==="
          cat $GITHUB_OUTPUT
          echo "=== REPO CONTENTS ==="
          ls -R

      # ==========================================
      # PROBLEM 1: GOLDEN SEARCH
      # ==========================================
      - name: Run Problem 1
        if: ${{ inputs.grade_p1 }}
        continue-on-error: true
        env:
          W_EXP: "[2.4748, 2.3978, 2.2638, 2.0616, 1.7678, 1.3229, 0.3535, 0.0002, 0.0002, 0.0002]"
        run: |
          if [ "${{ steps.setup.outputs.lang }}" == "py" ]; then
            python -c "
          import sys, numpy as np, os; sys.path.append('./problem_1')
          try:
              from golden_search import golden_search
              xm, fm, eb = golden_search(lambda x: -(x-3)**2+10, 0, 5, 10)
              open('p1_a', 'w').write('Pass' if abs(xm-3.0) < 0.1 else f'Wrong result: xm={xm:.2f}')
          except Exception as e: open('p1_a', 'w').write(f'Function Error: {type(e).__name__}')
          try:
              import freq_response as fr
              W_EXPECTED = np.array(eval(os.environ['W_EXP']))
              if not hasattr(fr, 'W_max'): open('p1_b', 'w').write('Variable W_max not found')
              elif not np.allclose(np.array(fr.W_max).flatten(), W_EXPECTED, atol=0.1): open('p1_b', 'w').write('W_max values incorrect')
              else: open('p1_b', 'w').write('Pass')
          except Exception as e: open('p1_b', 'w').write(f'Script Error: {type(e).__name__}')
          "
          elif [ "${{ steps.setup.outputs.lang }}" == "m" ]; then
            octave --no-gui --eval "
            try addpath('problem_1'); [xm]=golden_search(@(x)-(x-3).^2+10,0,5,10); res=(abs(xm-3)<0.1)?'Pass':['Wrong value: ',num2str(xm)]; catch; res='Function not found/errored'; end; f=fopen('p1_a','w'); fprintf(f,res); fclose(f);
            try addpath('problem_1'); freq_response; W_EXPECTED=str2num(getenv('W_EXP')); if ~exist('W_max','var'); res='W_max not found'; elseif ~all(abs(W_max(:)'-W_EXPECTED)<0.1); res='Values incorrect'; else res='Pass'; end; catch; res='Script failed'; end; f=fopen('p1_b','w'); fprintf(f,res); fclose(f);
            "
          elif [ "${{ steps.setup.outputs.lang }}" == "jl" ]; then
            julia -e '
            res_a = try; include("problem_1/golden_search.jl"); xm, fm, eb = golden_search(x -> -(x-3)^2+10, 0.0, 5.0, 10); abs(xm - 3.0) < 0.1 ? "Pass" : "Wrong result"; catch e; "Function error"; end
            open("p1_a", "w") do f write(f, res_a) end
            res_b = try; include("problem_1/freq_response.jl"); W_EXPECTED = eval(Meta.parse(get(ENV, "W_EXP", ""))); if !@isdefined(W_max); "W_max missing"; elseif length(W_max) != 10; "Size mismatch"; elseif all(abs.(vec(W_max) .- vec(W_EXPECTED)) .< 0.1); "Pass"; else; "Values incorrect"; end; catch; "Script failed"; end
            open("p1_b", "w") do f write(f, res_b) end
            '
          fi

      # ==========================================
      # PROBLEM 2: STEEPEST ASCENT
      # ==========================================
      - name: Run Problem 2
        if: ${{ inputs.grade_p2 }}
        continue-on-error: true
        env:
          EXP_X: "[0.3726, 0.7463, 0.3350]"
          EXP_Y: "3.3030"
        run: |
          if [ "${{ steps.setup.outputs.lang }}" == "py" ]; then
            python -c "
          import sys, numpy as np, os; sys.path.append('./problem_2')
          try:
              from steepest_ascent import steepest_ascent
              xm, fm = steepest_ascent(lambda x: 10-(x[0]-1)**2-(x[1]-2)**2, lambda x: np.array([-2*(x[0]-1), -2*(x[1]-2)]), [0,0], 1.0, 0.001, 100)
              open('p2_a', 'w').write('Pass' if np.allclose(xm, [1.0, 2.0], atol=0.2) else 'Failed to converge')
          except Exception as e: open('p2_a', 'w').write(f'Function error: {type(e).__name__}')
          try:
              import SA_driver as sd
              EXPECTED_X = np.array(eval(os.environ['EXP_X']))
              EXPECTED_Y = float(os.environ['EXP_Y'])
              if not hasattr(sd, 'x_max') or not hasattr(sd, 'y_max'): open('p2_b', 'w').write('x_max or y_max missing')
              elif not np.allclose(np.array(sd.x_max).flatten(), EXPECTED_X, atol=0.1): open('p2_b', 'w').write('x_max values incorrect')
              elif abs(sd.y_max - EXPECTED_Y) > 0.1: open('p2_b', 'w').write('y_max value incorrect')
              else: open('p2_b', 'w').write('Pass')
          except Exception as e: open('p2_b', 'w').write(f'Script error: {type(e).__name__}')
          "
          elif [ "${{ steps.setup.outputs.lang }}" == "m" ]; then
            octave --no-gui --eval "
            try addpath('problem_2'); [xm,fm]=steepest_ascent(@(x)10-(x(1)-1)^2-(x(2)-2)^2, @(x)[-2*(x(1)-1);-2*(x(2)-2)], [0;0], 1.0, 0.001, 100); res=(all(abs(xm(:)'-[1,2])<0.2))?'Pass':'Failed to converge'; catch; res='Function error'; end; f=fopen('p2_a','w'); fprintf(f,res); fclose(f);
            try addpath('problem_2'); SA_driver; EXPECTED_X=str2num(getenv('EXP_X')); EXPECTED_Y=str2num(getenv('EXP_Y')); if ~exist('x_max','var') || ~exist('y_max','var'); res='Variables missing'; elseif ~all(abs(x_max(:)'-EXPECTED_X)<0.1); res='x_max incorrect'; elseif abs(y_max-EXPECTED_Y)>0.1; res='y_max incorrect'; else res='Pass'; end; catch; res='Script crashed'; end; f=fopen('p2_b','w'); fprintf(f,res); fclose(f);
            "
          elif [ "${{ steps.setup.outputs.lang }}" == "jl" ]; then
            julia -e '
            res_a = try; include("problem_2/steepest_ascent.jl"); xm,fm=steepest_ascent(x->10-(x[1]-1)^2-(x[2]-2)^2, x->[-2*(x[1]-1), -2*(x[2]-2)], [0.0, 0.0], 1.0, 0.001, 100); all(abs.(xm.-[1.0,2.0]).<0.2) ? "Pass" : "Failed to converge"; catch; "Function error"; end
            open("p2_a","w") do f write(f,res_a) end
            res_b = try; include("problem_2/SA_driver.jl"); EXPECTED_X=eval(Meta.parse(get(ENV,"EXP_X",""))); EXPECTED_Y=parse(Float64,get(ENV,"EXP_Y","0")); if !@isdefined(x_max) || !@isdefined(y_max); "Variables missing"; elseif !all(abs.(vec(x_max).-vec(EXPECTED_X)).<0.1); "x_max incorrect"; elseif abs(y_max-EXPECTED_Y)>0.1; "y_max incorrect"; else; "Pass"; end; catch; "Script crashed"; end
            open("p2_b","w") do f write(f,res_b) end
            '
          fi

      # ==========================================
      # PROBLEM 3: INTEGRATION
      # ==========================================
      - name: Run Problem 3
        if: ${{ inputs.grade_p3 }}
        continue-on-error: true
        env:
          EXP_T: "[22.5105, 23.0482, 23.6187, 24.2257, 24.8732, 25.5663, 26.3105, 27.1127, 27.9812, 28.9261, 29.9597, 31.0977, 32.3598, 33.7718, 35.3683, 37.1965, 39.3236, 41.8498, 44.9336, 48.8471, 54.1177]"
        run: |
          if [ "${{ steps.setup.outputs.lang }}" == "py" ]; then
            python -c "
          import sys, numpy as np, os; sys.path.append('./problem_3')
          try:
              from trapezoider import trapezoider
              val = trapezoider(np.sin, 0, np.pi, 100)
              open('p3_a', 'w').write('Pass' if abs(val-2.0)<0.1 else f'Integral wrong: {val:.2f}')
          except Exception as e: open('p3_a', 'w').write(f'Function error: {type(e).__name__}')
          try:
              import droplet_radiation as dr
              EXPECTED_T = np.array(eval(os.environ['EXP_T']))
              if not hasattr(dr, 't_cool'): open('p3_b', 'w').write('Variable t_cool missing')
              else:
                  student = np.array(dr.t_cool).flatten()
                  if len(student) != 21: open('p3_b', 'w').write(f'Size mismatch: got {len(student)}')
                  elif np.allclose(student, EXPECTED_T, atol=0.2): open('p3_b', 'w').write('Pass')
                  else: open('p3_b', 'w').write('Values incorrect (Check c or N)')
          except Exception as e: open('p3_b', 'w').write(f'Script Error: {type(e).__name__}')
          "
          elif [ "${{ steps.setup.outputs.lang }}" == "m" ]; then
            octave --no-gui --eval "
            try addpath('problem_3'); val=trapezoider(@sin,0,pi,100); res=(abs(val-2)<0.1)?'Pass':'Wrong result'; catch; res='Function not found'; end; f=fopen('p3_a','w'); fprintf(f,res); fclose(f);
            try addpath('problem_3'); droplet_radiation; EXPECTED_T=str2num(getenv('EXP_T')); if ~exist('t_cool','var'); res='t_cool not found'; elseif length(t_cool)!=21; res='t_cool size mismatch'; elseif all(abs(t_cool(:)'-EXPECTED_T)<0.2); res='Pass'; else res='Values incorrect'; end; catch; res='Script crashed'; end; f=fopen('p3_b','w'); fprintf(f,res); fclose(f);
            "
          elif [ "${{ steps.setup.outputs.lang }}" == "jl" ]; then
            julia -e '
            res_a = try; include("problem_3/trapezoider.jl"); val = trapezoider(sin, 0.0, pi, 100); abs(val-2.0)<0.1 ? "Pass" : "Wrong result"; catch; "Function error"; end
            open("p3_a","w") do f write(f,res_a) end
            res_b = try; include("problem_3/droplet_radiation.jl"); EXPECTED_T = eval(Meta.parse(get(ENV, "EXP_T", ""))); if !@isdefined(t_cool); "t_cool not found"; elseif length(t_cool) != 21; "Size mismatch"; elseif all(abs.(vec(t_cool) .- vec(EXPECTED_T)) .< 0.2); "Pass"; else; "Values incorrect"; end; catch; "Script crashed"; end
            open("p3_b","w") do f write(f,res_b) end
            '
          fi

      # ==========================================
      # FINAL REPORT
      # ==========================================
      - name: Print Results
        if: always()
        run: |
          P1A=$(cat p1_a 2>/dev/null || echo "Not Run (Check Language)")
          P1B=$(cat p1_b 2>/dev/null || echo "Not Run (Check Language)")
          P2A=$(cat p2_a 2>/dev/null || echo "Not Run (Check Language)")
          P2B=$(cat p2_b 2>/dev/null || echo "Not Run (Check Language)")
          P3A=$(cat p3_a 2>/dev/null || echo "Not Run (Check Language)")
          P3B=$(cat p3_b 2>/dev/null || echo "Not Run (Check Language)")
          
          echo "## Autograder Feedback" >> $GITHUB_STEP_SUMMARY
          echo "| Problem | Part A | Part B |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 1 | $P1A | $P1B |" >> $GITHUB_STEP_SUMMARY
          echo "| 2 | $P2A | $P2B |" >> $GITHUB_STEP_SUMMARY
          echo "| 3 | $P3A | $P3B |" >> $GITHUB_STEP_SUMMARY

          echo "GRADER_DATA_EXPORT | P1A:$P1A | P1B:$P1B | P2A:$P2A | P2B:$P2B | P3A:$P3A | P3B:$P3B"
          
          if [ "${{ inputs.grade_p1 }}" == "true" ] && { [ "$P1A" != "Pass" ] || [ "$P1B" != "Pass" ]; }; then exit 1; fi
          if [ "${{ inputs.grade_p2 }}" == "true" ] && { [ "$P2A" != "Pass" ] || [ "$P2B" != "Pass" ]; }; then exit 1; fi
          if [ "${{ inputs.grade_p3 }}" == "true" ] && { [ "$P3A" != "Pass" ] || [ "$P3B" != "Pass" ]; }; then exit 1; fi