# .github/workflows/test-assignment.yml
name: Test Assignment

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================
  # 1. RATE LIMIT (5-MINUTE COOLDOWN)
  # ==========================================
  rate-limit:
    name: Cooldown Check
    runs-on: ubuntu-latest
    steps:
      - name: Enforce 5-Min Cooldown
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST_RUN=$(gh run list --workflow="${{ github.workflow }}" --user="${{ github.actor }}" --limit 2 --json createdAt --jq '.[1].createdAt')
          if [ -z "$LAST_RUN" ] || [ "$LAST_RUN" == "null" ]; then exit 0; fi
          DIFF=$(( $(date +%s) - $(date -d "$LAST_RUN" +%s) ))
          if [ $DIFF -lt 300 ]; then
            echo "::error::Cooldown active. Please wait $(( (300 - $DIFF) / 60 + 1 )) minute(s) before pushing again."
            exit 1
          fi

  # ==========================================
  # 2. DETECT CHANGES
  # ==========================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    needs: [rate-limit]
    outputs:
      p1: ${{ steps.filter.outputs.p1 }}
      p2: ${{ steps.filter.outputs.p2 }}
      p3: ${{ steps.filter.outputs.p3 }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            p1: ['problem_1/**']
            p2: ['problem_2/**']
            p3: ['problem_3/**']

  # ==========================================
  # 3. PROBLEM 1 (Golden Search)
  # ==========================================
  test-p1:
    name: Problem 1
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [detect-changes]
    if: needs.detect-changes.outputs.p1 == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Detect Language
        id: detect
        run: |
          if [ -f "problem_1/golden_search.py" ]; then echo "lang=py" >> $GITHUB_OUTPUT
          elif [ -f "problem_1/golden_search.jl" ]; then echo "lang=jl" >> $GITHUB_OUTPUT
          elif [ -f "problem_1/golden_search.m" ]; then echo "lang=m" >> $GITHUB_OUTPUT
          else exit 1; fi

      - name: Run Tests
        id: run_tests
        continue-on-error: true
        run: |
          if [ "${{ steps.detect.outputs.lang }}" == "py" ]; then
            pip install numpy
            python -c "
          import sys, numpy as np
          sys.path.append('./problem_1'); from golden_search import golden_search
          try: 
              xm, fm, eb = golden_search(lambda x: -(x-3)**2+10, 0, 5, 10)
              assert abs(xm-3.0) < 0.01
              open('status_a', 'w').write('Pass')
          except: open('status_a', 'w').write('Fail')
          try:
              import freq_response as fr
              W_EXP = [2.4748, 2.3978, 2.2638, 2.0616, 1.7678, 1.3229, 0.3535, 0.0002, 0.0002, 0.0002]
              G_EXP = [5.0252, 2.5516, 1.7471, 1.3639, 1.1547, 1.0417, 1.0002, 1.0000, 1.0000, 1.0000]
              assert np.allclose(fr.W_max, W_EXP, atol=0.001)
              assert np.allclose(fr.G_max, G_EXP, atol=0.001)
              open('status_b', 'w').write('Pass')
          except: open('status_b', 'w').write('Fail')
          "
          elif [ "${{ steps.detect.outputs.lang }}" == "jl" ]; then
            julia -e '
            try include("problem_1/golden_search.jl"); xm,fm,eb=golden_search(x->-(x-3)^2+10,0,5,10); abs(xm-3.0)<0.01 ? open("status_a","w") do f write(f,"Pass") end : open("status_a","w") do f write(f,"Fail") end catch; open("status_a","w") do f write(f,"Fail") end end
            try include("problem_1/freq_response.jl"); W_EXP=[2.4748, 2.3978, 2.2638, 2.0616, 1.7678, 1.3229, 0.3535, 0.0002, 0.0002, 0.0002]; G_EXP=[5.0252, 2.5516, 1.7471, 1.3639, 1.1547, 1.0417, 1.0002, 1.0000, 1.0000, 1.0000]; (all(abs.(W_max.-W_EXP).<0.001) && all(abs.(G_max.-G_EXP).<0.001)) ? open("status_b","w") do f write(f,"Pass") end : open("status_b","w") do f write(f,"Fail") end catch; open("status_b","w") do f write(f,"Fail") end end
            '
          else
            sudo apt-get install -y octave
            octave --no-gui --eval "
            try addpath('problem_1'); [xm,fm]=golden_search(@(x)-(x-3).^2+10,0,5,10); if abs(xm-3)<0.01 f=fopen('status_a','w'); fprintf(f,'Pass'); fclose(f); else f=fopen('status_a','w'); fprintf(f,'Fail'); fclose(f); end catch f=fopen('status_a','w'); fprintf(f,'Fail'); fclose(f); end
            try freq_response; W_EXP=[2.4748, 2.3978, 2.2638, 2.0616, 1.7678, 1.3229, 0.3535, 0.0002, 0.0002, 0.0002]; G_EXP=[5.0252, 2.5516, 1.7471, 1.3639, 1.1547, 1.0417, 1.0002, 1.0000, 1.0000, 1.0000]; if all(abs(W_max(:)'-W_EXP)<0.001) && all(abs(G_max(:)'-G_EXP)<0.001) f=fopen('status_b','w'); fprintf(f,'Pass'); fclose(f); else f=fopen('status_b','w'); fprintf(f,'Fail'); fclose(f); end catch f=fopen('status_b','w'); fprintf(f,'Fail'); fclose(f); end
            "
          fi

      - name: Generate Summary
        if: always()
        run: |
          SA=$(cat status_a 2>/dev/null || echo "Fail")
          SB=$(cat status_b 2>/dev/null || echo "Fail")
          echo "### Problem 1 Results" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          [ "$SA" == "Pass" ] && echo "| Part A: General Functionality | ✅ Pass |" >> $GITHUB_STEP_SUMMARY || echo "| Part A: General Functionality | ❌ Fail |" >> $GITHUB_STEP_SUMMARY
          [ "$SB" == "Pass" ] && echo "| Part B: freq_response script | ✅ Pass |" >> $GITHUB_STEP_SUMMARY || echo "| Part B: freq_response script | ❌ Fail |" >> $GITHUB_STEP_SUMMARY
          if [ "$SA" == "Fail" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> **Note on Part A:** Your \`golden_search\` function failed on a test equation not found in the problem statement. This suggests your function might be hard-coded or lacks generality." >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$SA" != "Pass" ] || [ "$SB" != "Pass" ]; then exit 1; fi

  # ==========================================
  # 4. PROBLEM 2 (Steepest Ascent)
  # ==========================================
  test-p2:
    name: Problem 2
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [detect-changes]
    if: needs.detect-changes.outputs.p2 == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Detect Language
        id: detect
        run: |
          if [ -f "problem_2/steepest_ascent.py" ]; then echo "lang=py" >> $GITHUB_OUTPUT
          elif [ -f "problem_2/steepest_ascent.jl" ]; then echo "lang=jl" >> $GITHUB_OUTPUT
          elif [ -f "problem_2/steepest_ascent.m" ]; then echo "lang=m" >> $GITHUB_OUTPUT
          else exit 1; fi

      - name: Run Tests
        id: run_tests
        continue-on-error: true
        run: |
          if [ "${{ steps.detect.outputs.lang }}" == "py" ]; then
            pip install numpy
            python -c "
          import sys, numpy as np
          sys.path.append('./problem_2'); from steepest_ascent import steepest_ascent
          try:
              xm, fm = steepest_ascent(lambda x: 10-(x[0]-1)**2-(x[1]-2)**2, lambda x: np.array([-2*(x[0]-1), -2*(x[1]-2)]), [0,0], 1.0, 0.001, 100)
              assert np.allclose(xm, [1.0, 2.0], atol=0.01)
              open('status_a', 'w').write('Pass')
          except: open('status_a', 'w').write('Fail')
          try:
              import SA_driver as sd
              EXP_X, EXP_Y = [0.3726, 0.7463, 0.3350], 3.3030
              assert np.allclose(sd.x_max, EXP_X, atol=0.001)
              assert abs(sd.y_max - EXP_Y) < 0.001
              open('status_b', 'w').write('Pass')
          except: open('status_b', 'w').write('Fail')
          "
          elif [ "${{ steps.detect.outputs.lang }}" == "jl" ]; then
            julia -e '
            try include("problem_2/steepest_ascent.jl"); xm,fm=steepest_ascent(x->10-(x[1]-1)^2-(x[2]-2)^2,x->[-2*(x[1]-1),-2*(x[2]-2)],[0.0,0.0],1.0,0.001,100); all(abs.(xm.-[1.0,2.0]).<0.01) ? open("status_a","w") do f write(f,"Pass") end : open("status_a","w") do f write(f,"Fail") end catch; open("status_a","w") do f write(f,"Fail") end end
            try include("problem_2/SA_driver.jl"); EXP_X=[0.3726,0.7463,0.3350]; EXP_Y=3.3030; (all(abs.(x_max.-EXP_X).<0.001) && abs(y_max-EXP_Y)<0.001) ? open("status_b","w") do f write(f,"Pass") end : open("status_b","w") do f write(f,"Fail") end catch; open("status_b","w") do f write(f,"Fail") end end
            '
          else
            sudo apt-get install -y octave
            octave --no-gui --eval "
            try addpath('problem_2'); [xm,fm]=steepest_ascent(@(x)10-(x(1)-1).^2-(x(2)-2).^2, @(x)[-2*(x(1)-1);-2*(x(2)-2)],[0;0],1.0,0.001,100); if all(abs(xm(:)-[1;2])<0.01) f=fopen('status_a','w'); fprintf(f,'Pass'); fclose(f); else f=fopen('status_a','w'); fprintf(f,'Fail'); fclose(f); end catch f=fopen('status_a','w'); fprintf(f,'Fail'); fclose(f); end
            try SA_driver; EXP_X=[0.3726,0.7463,0.3350]; EXP_Y=3.3030; if all(abs(x_max(:)'-EXP_X)<0.001) && abs(y_max-EXP_Y)<0.001 f=fopen('status_b','w'); fprintf(f,'Pass'); fclose(f); else f=fopen('status_b','w'); fprintf(f,'Fail'); fclose(f); end catch f=fopen('status_b','w'); fprintf(f,'Fail'); fclose(f); end
            "
          fi

      - name: Generate Summary
        if: always()
        run: |
          SA=$(cat status_a 2>/dev/null || echo "Fail")
          SB=$(cat status_b 2>/dev/null || echo "Fail")
          echo "### Problem 2 Results" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          [ "$SA" == "Pass" ] && echo "| Part A: General Functionality | ✅ Pass |" >> $GITHUB_STEP_SUMMARY || echo "| Part A: General Functionality | ❌ Fail |" >> $GITHUB_STEP_SUMMARY
          [ "$SB" == "Pass" ] && echo "| Part B: SA_driver script | ✅ Pass |" >> $GITHUB_STEP_SUMMARY || echo "| Part B: SA_driver script | ❌ Fail |" >> $GITHUB_STEP_SUMMARY
          if [ "$SA" == "Fail" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> **Note on Part A:** Your \`steepest_ascent\` function failed on a multi-variable 'inverted bowl' test. Ensure your gradient update logic is general." >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$SA" != "Pass" ] || [ "$SB" != "Pass" ]; then exit 1; fi

  # ==========================================
  # 5. PROBLEM 3 (Integration)
  # ==========================================
  test-p3:
    name: Problem 3
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [detect-changes]
    if: needs.detect-changes.outputs.p3 == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Detect Language
        id: detect
        run: |
          if [ -f "problem_3/trapezoider.py" ]; then echo "lang=py" >> $GITHUB_OUTPUT
          elif [ -f "problem_3/trapezoider.jl" ]; then echo "lang=jl" >> $GITHUB_OUTPUT
          elif [ -f "problem_3/trapezoider.m" ]; then echo "lang=m" >> $GITHUB_OUTPUT
          else exit 1; fi

      - name: Run Tests
        id: run_tests
        continue-on-error: true
        run: |
          EXP_T="[22.5105, 23.0482, 23.6187, 24.2257, 24.8732, 25.5663, 26.3105, 27.1127, 27.9812, 28.9261, 29.9597, 31.0977, 32.3598, 33.7718, 35.3683, 37.1965, 39.3236, 41.8498, 44.9336, 48.8471, 54.1177]"
          if [ "${{ steps.detect.outputs.lang }}" == "py" ]; then
            pip install numpy
            python -c "
          import sys, numpy as np
          sys.path.append('./problem_3'); from trapezoider import trapezoider
          try:
              val = trapezoider(np.sin, 0, np.pi, 100)
              assert abs(val - 2.0) < 0.01
              open('status_a', 'w').write('Pass')
          except: open('status_a', 'w').write('Fail')
          try:
              import droplet_radiation as dr
              EXP_T = $EXP_T
              assert np.allclose(dr.t_cool, EXP_T, atol=0.001)
              open('status_b', 'w').write('Pass')
          except: open('status_b', 'w').write('Fail')
          "
          elif [ "${{ steps.detect.outputs.lang }}" == "jl" ]; then
            julia -e '
            try include("problem_3/trapezoider.jl"); val=trapezoider(sin,0.0,pi,100); abs(val-2.0)<0.01 ? open("status_a","w") do f write(f,"Pass") end : open("status_a","w") do f write(f,"Fail") end catch; open("status_a","w") do f write(f,"Fail") end end
            try include("problem_3/droplet_radiation.jl"); EXP_T='$EXP_T'; all(abs.(t_cool.-EXP_T).<0.001) ? open("status_b","w") do f write(f,"Pass") end : open("status_b","w") do f write(f,"Fail") end catch; open("status_b","w") do f write(f,"Fail") end end
            '
          else
            sudo apt-get install -y octave
            octave --no-gui --eval "
            try addpath('problem_3'); val=trapezoider(@sin,0,pi,100); if abs(val-2.0)<0.01 f=fopen('status_a','w'); fprintf(f,'Pass'); fclose(f); else f=fopen('status_a','w'); fprintf(f,'Fail'); fclose(f); end catch f=fopen('status_a','w'); fprintf(f,'Fail'); fclose(f); end
            try droplet_radiation; EXP_T=$EXP_T; if all(abs(t_cool(:)'-EXP_T)<0.001) f=fopen('status_b','w'); fprintf(f,'Pass'); fclose(f); else f=fopen('status_b','w'); fprintf(f,'Fail'); fclose(f); end catch f=fopen('status_b','w'); fprintf(f,'Fail'); fclose(f); end
            "
          fi

      - name: Generate Summary
        if: always()
        run: |
          SA=$(cat status_a 2>/dev/null || echo "Fail")
          SB=$(cat status_b 2>/dev/null || echo "Fail")
          echo "### Problem 3 Results" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          [ "$SA" == "Pass" ] && echo "| Part A: General Functionality | ✅ Pass |" >> $GITHUB_STEP_SUMMARY || echo "| Part A: General Functionality | ❌ Fail |" >> $GITHUB_STEP_SUMMARY
          [ "$SB" == "Pass" ] && echo "| Part B: droplet_radiation script | ✅ Pass |" >> $GITHUB_STEP_SUMMARY || echo "| Part B: droplet_radiation script | ❌ Fail |" >> $GITHUB_STEP_SUMMARY
          if [ "$SA" == "Fail" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> **Note on Part A:** Your \`trapezoider\` function failed on a standard sinusoid integral. Check your trapezoidal summation logic." >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$SA" != "Pass" ] || [ "$SB" != "Pass" ]; then exit 1; fi